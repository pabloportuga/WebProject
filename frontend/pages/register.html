<html>
    <form>
        <label for="username">Nome de usuário:</label>
        <input type="text" id="username" name="username" placeholder="Digite seu nome de usuário"><br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail"><br>
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" placeholder="Digite sua senha"><br>
        <label for="confirmPassword">Confirme sua senha:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Digite novamente sua senha"><br>
        <button type="submit">Criar conta</button>
    </form>
<a href="login.html">Página de Login</a>
</html>
